<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeAH CM CPL LINE 일일현황 일지</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2"></div>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-bold text-slate-900 flex items-center gap-2 justify-center md:justify-start">
                <i data-lucide="clipboard-edit" class="text-blue-600 w-8 h-8"></i>
                SeAH CM CPL LINE 일일현황 일지
            </h1>
            <p class="text-slate-500 mt-2">현장에서 발생한 특이사항을 입력하고 저장하세요.</p>
        </header>

        <!-- Main Content -->
        <main class="w-full">
            
            <!-- Input Area (Expanded Width) -->
            <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col min-h-[700px]">
                <div class="bg-slate-100 border-b border-slate-200 px-6 py-4 flex items-center justify-between">
                    <h2 class="font-semibold text-slate-800 flex items-center gap-2">
                        <i data-lucide="pen-line" class="w-5 h-5 text-slate-500"></i>
                        근무 일지 작성
                    </h2>
                    <div class="flex gap-2">
                        <!-- 저장 버튼 (상단) -->
                        <button onclick="saveRawData()" class="text-sm bg-slate-800 border border-slate-900 text-white hover:bg-slate-700 px-3 py-1.5 rounded-lg transition-colors duration-200 flex items-center gap-1.5 shadow-sm">
                            <i data-lucide="save" class="w-4 h-4"></i> 저장
                        </button>
                        <button onclick="loadExample()" class="text-sm text-blue-600 border border-blue-200 hover:text-blue-800 hover:bg-blue-50 px-2 py-1.5 rounded transition-colors duration-200 flex items-center gap-1">
                            <i data-lucide="lightbulb" class="w-4 h-4"></i> 예시
                        </button>
                    </div>
                </div>
                
                <div class="p-6 flex-grow flex flex-col gap-6">
                    <!-- 날짜 선택 -->
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 flex items-center gap-4">
                        <label class="font-medium text-slate-700 flex items-center gap-2">
                            <i data-lucide="calendar" class="w-4 h-4 text-slate-500"></i>
                            근무 일자
                        </label>
                        <input type="date" id="reportDate" class="p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm bg-white transition-colors duration-200">
                    </div>
                    
                    <!-- 1~3근 입력 폼 -->
                    <div class="flex-grow flex flex-col gap-5">
                        <!-- 1근 -->
                        <div class="flex flex-col gap-2 p-5 bg-white border-2 border-slate-100 rounded-xl shadow-sm focus-within:border-blue-200 transition-colors">
                            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                                <span class="font-bold text-slate-800 flex items-center gap-2 text-lg">
                                    <div class="w-3 h-3 bg-blue-500 rounded-full"></div>1근 (주간)
                                </span>
                                <div class="flex items-center gap-2">
                                    <label class="text-sm text-slate-500">작성자:</label>
                                    <input type="text" id="writer1" placeholder="성명 입력" class="p-1.5 border border-slate-300 rounded-md text-sm w-32 focus:ring-1 focus:ring-blue-500 bg-white">
                                </div>
                            </div>
                            <textarea id="input1" class="w-full h-24 p-2 border-0 focus:ring-0 resize-none text-base bg-transparent placeholder-slate-400 mt-2" placeholder="1근 업무 내용 및 특이사항 입력..."></textarea>
                        </div>
                        
                        <!-- 2근 -->
                        <div class="flex flex-col gap-2 p-5 bg-white border-2 border-slate-100 rounded-xl shadow-sm focus-within:border-amber-200 transition-colors">
                            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                                <span class="font-bold text-slate-800 flex items-center gap-2 text-lg">
                                    <div class="w-3 h-3 bg-amber-500 rounded-full"></div>2근 (오후/야간)
                                </span>
                                <div class="flex items-center gap-2">
                                    <label class="text-sm text-slate-500">작성자:</label>
                                    <input type="text" id="writer2" placeholder="성명 입력" class="p-1.5 border border-slate-300 rounded-md text-sm w-32 focus:ring-1 focus:ring-blue-500 bg-white">
                                </div>
                            </div>
                            <textarea id="input2" class="w-full h-24 p-2 border-0 focus:ring-0 resize-none text-base bg-transparent placeholder-slate-400 mt-2" placeholder="2근 업무 내용 및 특이사항 입력..."></textarea>
                        </div>

                        <!-- 3근 -->
                        <div class="flex flex-col gap-2 p-5 bg-white border-2 border-slate-100 rounded-xl shadow-sm focus-within:border-indigo-200 transition-colors">
                            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                                <span class="font-bold text-slate-800 flex items-center gap-2 text-lg">
                                    <div class="w-3 h-3 bg-indigo-500 rounded-full"></div>3근 (심야)
                                </span>
                                <div class="flex items-center gap-2">
                                    <label class="text-sm text-slate-500">작성자:</label>
                                    <input type="text" id="writer3" placeholder="성명 입력" class="p-1.5 border border-slate-300 rounded-md text-sm w-32 focus:ring-1 focus:ring-blue-500 bg-white">
                                </div>
                            </div>
                            <textarea id="input3" class="w-full h-24 p-2 border-0 focus:ring-0 resize-none text-base bg-transparent placeholder-slate-400 mt-2" placeholder="3근 업무 내용 및 특이사항 입력..."></textarea>
                        </div>
                    </div>
                    
                    <!-- 엑셀 다운로드 버튼 (하단) -->
                    <button onclick="exportToExcel()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-4 rounded-xl shadow-md transition-all duration-200 flex items-center justify-center gap-2 mt-2">
                        <i data-lucide="file-spreadsheet" class="w-6 h-6"></i>
                        <span class="text-lg">엑셀 파일로 다운로드</span>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Initialize date and icons on load
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('reportDate').value = today;
        });

        // UI Helpers
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.className = `${bgColor} text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-y-[-100%] opacity-0`;
            toast.innerHTML = `
                <i data-lucide="${icon}" class="w-5 h-5"></i>
                <span class="font-medium">${message}</span>
            `;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.remove('translate-y-[-100%]', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('translate-y-[-100%]', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function openModal() {
            const modal = document.getElementById('aiModal');
            const content = document.getElementById('modalContent');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('aiModal');
            const content = document.getElementById('modalContent');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        function loadExample() {
            document.getElementById('writer1').value = '김철수 계장';
            document.getElementById('input1').value = '오전에 A구역 자재 정리하다가 B구역 수도관 누수 발견함. 10시쯤. 설비팀에 바로 연락했고 내일 오전 중에 수리하러 온다고 함.';
            
            document.getElementById('writer2').value = '이영희 계장';
            document.getElementById('input2').value = '1근에서 인계받은 B구역 수도관 누수 부위 안전 펜스 설치 완료함. 야간 작업자들 접근 금지 표지판 부착함. 그 외 특이사항 없음.';
            
            document.getElementById('writer3').value = '박지훈 계장';
            document.getElementById('input3').value = '순찰 중 C구역 조명등 2개 점등 불량 확인. 오전 반에서 교체 요망.';
            
            showToast('예시 데이터가 입력되었습니다.');
        }

        // 텍스트 파일 저장 기능 (상단 버튼)
        function saveRawData() {
            const dateVal = document.getElementById('reportDate').value || '미입력';
            
            const w1 = document.getElementById('writer1').value || '미입력';
            const i1 = document.getElementById('input1').value || '특이사항 없음';
            
            const w2 = document.getElementById('writer2').value || '미입력';
            const i2 = document.getElementById('input2').value || '특이사항 없음';
            
            const w3 = document.getElementById('writer3').value || '미입력';
            const i3 = document.getElementById('input3').value || '특이사항 없음';

            const content = `[SeAH CM CPL LINE 일일현황 일지]\n근무 일자: ${dateVal}\n\n[1근 (주간)]\n작성자: ${w1}\n내용:\n${i1}\n\n[2근 (오후/야간)]\n작성자: ${w2}\n내용:\n${i2}\n\n[3근 (심야)]\n작성자: ${w3}\n내용:\n${i3}`;

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `SeAH_일일현황일지_${dateVal}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            showToast('텍스트 파일로 성공적으로 저장되었습니다.');
        }

        // 엑셀 다운로드 기능
        function exportToExcel() {
            const dateVal = document.getElementById('reportDate').value || '미입력';
            
            const w1 = document.getElementById('writer1').value || '미입력';
            const i1 = document.getElementById('input1').value || '특이사항 없음';
            
            const w2 = document.getElementById('writer2').value || '미입력';
            const i2 = document.getElementById('input2').value || '특이사항 없음';
            
            const w3 = document.getElementById('writer3').value || '미입력';
            const i3 = document.getElementById('input3').value || '특이사항 없음';

            // 엑셀 시트 데이터 구성 (배열의 배열 형식)
            const wsData = [
                ["SeAH CM CPL LINE 일일현황 일지"],
                [],
                ["근무 일자", dateVal],
                [],
                ["근무조", "작성자", "업무 내용 및 특이사항"],
                ["1근 (주간)", w1, i1],
                ["2근 (오후/야간)", w2, i2],
                ["3근 (심야)", w3, i3]
            ];

            // 시트 생성
            const ws = XLSX.utils.aoa_to_sheet(wsData);

            // 열 너비(Column Width) 설정
            ws['!cols'] = [
                { wch: 15 }, // A열: 근무조
                { wch: 15 }, // B열: 작성자
                { wch: 80 }  // C열: 업무 내용
            ];

            // 워크북 생성 및 시트 추가
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "일일현황일지");

            // 파일명 설정 및 다운로드 실행
            const fileName = `SeAH_일일현황일지_${dateVal}.xlsx`;
            XLSX.writeFile(wb, fileName);
            
            showToast('엑셀 파일이 성공적으로 다운로드 되었습니다.');
        }
    </script>
</body>
</html>
